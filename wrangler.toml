name = "cf-ai-studyagent"
main = "worker/src/index.ts"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

# ── Workers AI ──────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Durable Objects ──────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "STUDY_AGENT"
class_name = "StudyAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StudyAgent"]

# ── D1 Database ───────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "studyagent-db"
database_id = "00e0d4fe-bfd0-49d4-af66-f0bcb35d7acf"

# ── Static assets (served from frontend/) ────────────────────────────
[assets]
directory = "./frontend"
